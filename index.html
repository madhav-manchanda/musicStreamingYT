<!DOCTYPE html>
<html lang="en" data-theme="melodyflow">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MelodyFlow — Music Streaming</title>
  <meta name="description" content="Stream millions of songs with MelodyFlow. Discover, play, and create playlists with a stunning interface." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=VT323&family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/frontend/style.css?v=2" />
  <link rel="stylesheet" href="/frontend/themes/melodyflow.css" />
  <link rel="stylesheet" href="/frontend/themes/dreadflow.css" />
</head>
<body>
  <div id="app">
    
    <aside id="sidebar" class="sidebar"></aside>

    <main id="main-content" class="main-content">
      <header id="top-bar" class="top-bar"></header>
      <div id="view-container" class="view-container"></div>
    </main>

    <aside id="right-panel" class="right-panel hidden">
      <div id="now-playing-detail" class="now-playing-detail"></div>
      <div id="queue-panel" class="queue-section"></div>
    </aside>

    <footer id="player-bar" class="player-bar"></footer>

    <div id="theme-overlay" class="theme-overlay"></div>

    <div id="context-menu" class="context-menu hidden"></div>

    <div id="toast-container" class="toast-container"></div>

    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">
        <h3 class="modal-title">Create Playlist</h3>
        <input type="text" id="playlist-name-input" class="modal-input" placeholder="Playlist name..." maxlength="50" />
        <div class="modal-actions">
          <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
          <button id="modal-create" class="btn btn-primary">Create</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/frontend/main.js?v=2"></script>
</body>
</html>
